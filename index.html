<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>The Executive Events — Costing Ledger</title>
<link rel="icon" href="data:,">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Inter',sans-serif; background:#FAF6EE; color:#211D17; }
  .beo-serif { font-family:'Cormorant Garamond', serif; }
  .beo-btn { display:inline-flex; align-items:center; gap:6px; border:none; cursor:pointer; border-radius:6px; font-family:inherit; font-weight:600; transition:all .15s ease; }
  .beo-btn:active { transform:scale(0.97); }
  .beo-btn-primary { background:#6B1E23; color:#FAF6EE; padding:9px 16px; font-size:14px; }
  .beo-btn-primary:hover { background:#5a191d; }
  .beo-btn-gold { background:#B8934A; color:#211D17; padding:9px 16px; font-size:14px; }
  .beo-btn-gold:hover { background:#a68140; }
  .beo-btn-ghost { background:transparent; color:#6B1E23; padding:6px 10px; font-size:13px; border:1px solid #E4DCC8; }
  .beo-btn-ghost:hover { background:#F1EADA; }
  .beo-input { border:1px solid #E4DCC8; background:#fff; border-radius:6px; padding:8px 10px; font-family:inherit; font-size:14px; color:#211D17; width:100%; }
  .beo-input:focus { outline:2px solid #B8934A; outline-offset:1px; }
  .beo-card { background:#fff; border:1px solid #EDE6D6; border-radius:10px; }
  .two-col { display:grid; grid-template-columns:260px 1fr; gap:20px; }
  .builder-col { display:grid; grid-template-columns:1fr 380px; gap:20px; }
  @media (max-width:800px) {
    .two-col, .builder-col { grid-template-columns: 1fr !important; }
  }
  #print-area { display:none; }
  @media print {
    body * { visibility:hidden; }
    #print-area, #print-area * { visibility:visible; }
    #print-area { display:block !important; position:absolute; top:0; left:0; width:100%; padding:30px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="print-area"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel" data-type="module">
const { useState, useEffect, useRef } = React;
const auth = window.__auth;
const db = window.__db;

const DEFAULT_CATEGORIES = ["Entries", "SFX", "Welcome", "Itineraries", "Hotels", "Live Band", "Games", "Stationery"];
const uid = () => Math.random().toString(36).slice(2, 10);
const inr = (n) => "₹" + (Number(n) || 0).toLocaleString("en-IN", { maximumFractionDigits: 0 });
const fmtCurrency = (n, symbol) => (symbol || "₹") + (Number(n) || 0).toLocaleString("en-IN", { maximumFractionDigits: 0 });
const CURRENCY_OPTIONS = ["₹", "$", "€", "£", "AED"];
const HOTEL_STATUSES = ["Not contacted", "Contacted", "Quote received", "Booked", "Dead lead"];
const statusColor = (status) => ({
  "Not contacted": { bg: "#F1EADA", fg: "#8a8071" },
  "Contacted": { bg: "#DCEAF5", fg: "#2A6A9E" },
  "Quote received": { bg: "#FBE8CC", fg: "#B8712A" },
  "Booked": { bg: "#DDEFDD", fg: "#2E7D32" },
  "Dead lead": { bg: "#F5DCDC", fg: "#B33A3A" },
}[status] || { bg: "#F1EADA", fg: "#8a8071" });
const waLink = (phone) => "https://wa.me/" + String(phone || "").replace(/[^0-9]/g, "");

function App() {
  const [user, setUser] = useState(undefined);
  const [authError, setAuthError] = useState("");

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setUser(u || null));
    return unsub;
  }, []);

  if (user === undefined) return <div style={{ padding: 40, color: "#6b1e23" }}>Checking sign-in…</div>;
  if (user === null) return <LoginScreen onError={setAuthError} error={authError} />;
  return <MainApp user={user} />;
}

function LoginScreen({ onError, error }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);

  const signIn = async () => {
    setBusy(true); onError("");
    try {
      await auth.signInWithEmailAndPassword(email.trim(), password);
    } catch (e) {
      onError(e.message || "Sign-in failed. Check your email and password.");
    }
    setBusy(false);
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div className="beo-card" style={{ padding: 30, maxWidth: 360, width: "100%" }}>
        <div className="beo-serif" style={{ fontSize: 26, fontWeight: 700, color: "#6B1E23", marginBottom: 4 }}>The Executive Events</div>
        <div style={{ fontSize: 12.5, color: "#8a8071", marginBottom: 20 }}>Sign in with the account you created in Firebase.</div>
        <input className="beo-input" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} style={{ marginBottom: 10 }} />
        <input className="beo-input" placeholder="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && signIn()} style={{ marginBottom: 14 }} />
        {error && <div style={{ color: "#c9585d", fontSize: 12.5, marginBottom: 10 }}>{error}</div>}
        <button className="beo-btn beo-btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={signIn} disabled={busy}>
          {busy ? "Signing in…" : "Sign in"}
        </button>
      </div>
    </div>
  );
}

function MainApp({ user }) {
  const [loaded, setLoaded] = useState(false);
  const [categories, setCategories] = useState([]);
  const [budgets, setBudgets] = useState([]);
  const [cities, setCities] = useState([]);
  const [corpQuotes, setCorpQuotes] = useState([]);
  const [tab, setTab] = useState("inventory");
  const [activeBudgetId, setActiveBudgetId] = useState(null);
  const [activeCityId, setActiveCityId] = useState(null);
  const [activeHotelId, setActiveHotelId] = useState(null);
  const [activeQuoteId, setActiveQuoteId] = useState(null);
  const [syncStatus, setSyncStatus] = useState("syncing");
  const skipNextSave = useRef(false);
  const docRef = db.collection("beoUsers").doc(user.uid);

  useEffect(() => {
    const unsub = docRef.onSnapshot(snap => {
      const data = snap.data();
      skipNextSave.current = true;
      if (data && data.categories) setCategories(data.categories);
      else setCategories(DEFAULT_CATEGORIES.map(n => ({ id: uid(), name: n, items: [] })));
      if (data && data.budgets) setBudgets(data.budgets);
      else setBudgets([]);
      if (data && data.cities) setCities(data.cities);
      else setCities([]);
      if (data && data.corpQuotes) setCorpQuotes(data.corpQuotes);
      else setCorpQuotes([]);
      setLoaded(true);
      setSyncStatus("synced");
    }, err => {
      console.error(err);
      setSyncStatus("error");
    });
    return unsub;
  }, []);

  useEffect(() => {
    if (!loaded) return;
    if (skipNextSave.current) { skipNextSave.current = false; return; }
    setSyncStatus("syncing");
    docRef.set({ categories, budgets, cities, corpQuotes }, { merge: true })
      .then(() => setSyncStatus("synced"))
      .catch(e => { console.error(e); setSyncStatus("error"); });
  }, [categories, budgets, cities, corpQuotes]);

  const openBudget = (id) => { setActiveBudgetId(id); setTab("builder"); };
  const createBudget = () => {
    const b = { id: uid(), name: "New Client Budget", clientName: "", date: new Date().toISOString().slice(0, 10), lines: [], profit: 0, commissionPercent: 0, commissionMode: "final", createdAt: Date.now() };
    setBudgets(prev => [b, ...prev]);
    openBudget(b.id);
  };

  const openHotel = (cityId, hotelId) => { setActiveCityId(cityId); setActiveHotelId(hotelId); setTab("hotelDetail"); };
  const openQuote = (id) => { setActiveQuoteId(id); setTab("quoteBuilder"); };
  const createQuote = () => {
    const q = {
      id: uid(), name: "New Corporate Quote", clientName: "", date: new Date().toISOString().slice(0, 10),
      cityId: "", hotelId: "",
      rooms: { qty: 0, rate: 0, nights: 1 },
      banquet: { mode: "flat", pax: 0, rate: 0 },
      extraLines: [],
      profit: 0, commissionPercent: 0, commissionMode: "final", currency: "₹", createdAt: Date.now()
    };
    setCorpQuotes(prev => [q, ...prev]);
    openQuote(q.id);
  };

  if (!loaded) return <div style={{ padding: 40, color: "#6b1e23" }}>Loading your workspace…</div>;

  const activeHotel = (() => {
    const c = cities.find(c => c.id === activeCityId);
    if (!c) return null;
    return c.hotels.find(h => h.id === activeHotelId) || null;
  })();

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ borderBottom: "1px solid #EDE6D6", background: "#fff", padding: "18px 20px", display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div className="beo-serif" style={{ fontSize: 24, fontWeight: 700, color: "#6B1E23" }}>The Executive Events</div>
          <div style={{ fontSize: 11.5, color: syncStatus === "error" ? "#c9585d" : "#8a8071", marginTop: 2 }}>
            {syncStatus === "syncing" ? "Syncing…" : syncStatus === "error" ? "Sync error — check connection" : `Synced · ${user.email}`}
          </div>
        </div>
        <nav style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <TabBtn active={tab === "inventory"} onClick={() => setTab("inventory")}>Inventory</TabBtn>
          <TabBtn active={tab === "budgets" || tab === "builder"} onClick={() => setTab("budgets")}>Client Budgets</TabBtn>
          <TabBtn active={tab === "hotels" || tab === "hotelDetail"} onClick={() => setTab("hotels")}>Hotels</TabBtn>
          <TabBtn active={tab === "quotes" || tab === "quoteBuilder"} onClick={() => setTab("quotes")}>Corporate Quotes</TabBtn>
          <button className="beo-btn beo-btn-ghost" onClick={() => auth.signOut()}>Sign out</button>
        </nav>
      </div>
      <div style={{ padding: 20, maxWidth: 1200, margin: "0 auto" }}>
        {tab === "inventory" && <InventoryView categories={categories} setCategories={setCategories} />}
        {tab === "budgets" && <BudgetsListView budgets={budgets} setBudgets={setBudgets} onOpen={openBudget} onCreate={createBudget} />}
        {tab === "builder" && activeBudgetId && (
          <BudgetBuilder
            budget={budgets.find(b => b.id === activeBudgetId)}
            categories={categories}
            onBack={() => setTab("budgets")}
            onChange={(updated) => setBudgets(prev => prev.map(b => b.id === updated.id ? updated : b))}
          />
        )}
        {tab === "hotels" && (
          <HotelsView cities={cities} setCities={setCities} onOpenHotel={openHotel} />
        )}
        {tab === "hotelDetail" && activeHotel && (
          <HotelDetail
            city={cities.find(c => c.id === activeCityId)}
            hotel={activeHotel}
            quotes={corpQuotes}
            onOpenQuote={openQuote}
            onBack={() => setTab("hotels")}
            onChange={(updated) => setCities(prev => prev.map(c => c.id === activeCityId ? { ...c, hotels: c.hotels.map(h => h.id === updated.id ? updated : h) } : c))}
          />
        )}
        {tab === "quotes" && (
          <QuotesListView quotes={corpQuotes} setQuotes={setCorpQuotes} onOpen={openQuote} onCreate={createQuote} cities={cities} />
        )}
        {tab === "quoteBuilder" && activeQuoteId && (
          <CorporateQuoteBuilder
            quote={corpQuotes.find(q => q.id === activeQuoteId)}
            cities={cities}
            onBack={() => setTab("quotes")}
            onChange={(updated) => setCorpQuotes(prev => prev.map(q => q.id === updated.id ? updated : q))}
          />
        )}
      </div>
    </div>
  );
}

function TabBtn({ active, onClick, children }) {
  return (
    <button className="beo-btn" onClick={onClick} style={{ padding: "8px 14px", borderRadius: 6, fontSize: 14, background: active ? "#6B1E23" : "transparent", color: active ? "#FAF6EE" : "#6B1E23" }}>
      {children}
    </button>
  );
}

function InventoryView({ categories, setCategories }) {
  const [openCat, setOpenCat] = useState(categories[0]?.id || null);
  const [newCatName, setNewCatName] = useState("");
  const [itemDraft, setItemDraft] = useState({});

  useEffect(() => { if ((!openCat || !categories.find(c => c.id === openCat)) && categories[0]) setOpenCat(categories[0].id); }, [categories]);

  const addCategory = () => {
    if (!newCatName.trim()) return;
    const c = { id: uid(), name: newCatName.trim(), items: [] };
    setCategories(prev => [...prev, c]);
    setNewCatName(""); setOpenCat(c.id);
  };
  const removeCategory = (id) => setCategories(prev => prev.filter(c => c.id !== id));
  const addItem = (catId) => {
    const draft = itemDraft[catId];
    if (!draft || !draft.name?.trim()) return;
    const item = { id: uid(), name: draft.name.trim(), cost: Number(draft.cost) || 0 };
    setCategories(prev => prev.map(c => c.id === catId ? { ...c, items: [...c.items, item] } : c));
    setItemDraft(prev => ({ ...prev, [catId]: { name: "", cost: "" } }));
  };
  const removeItem = (catId, itemId) => setCategories(prev => prev.map(c => c.id === catId ? { ...c, items: c.items.filter(i => i.id !== itemId) } : c));
  const updateItem = (catId, itemId, patch) => setCategories(prev => prev.map(c => c.id === catId ? { ...c, items: c.items.map(i => i.id === itemId ? { ...i, ...patch } : i) } : c));

  return (
    <div className="two-col">
      <div className="beo-card" style={{ padding: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#8a8071", textTransform: "uppercase", marginBottom: 10 }}>Folders</div>
        {categories.map(c => (
          <div key={c.id} onClick={() => setOpenCat(c.id)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", borderRadius: 6, cursor: "pointer", background: openCat === c.id ? "#F1EADA" : "transparent", marginBottom: 2 }}>
            <span style={{ fontSize: 14 }}>📁 {c.name} <span style={{ fontSize: 11, color: "#a39a89" }}>({c.items.length})</span></span>
            <span style={{ color: "#c98b8e", cursor: "pointer" }} onClick={(e) => { e.stopPropagation(); removeCategory(c.id); }}>🗑</span>
          </div>
        ))}
        <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
          <input className="beo-input" placeholder="New folder" value={newCatName} onChange={e => setNewCatName(e.target.value)} onKeyDown={e => e.key === "Enter" && addCategory()} style={{ fontSize: 13 }} />
          <button className="beo-btn beo-btn-gold" onClick={addCategory}>＋</button>
        </div>
      </div>
      <div className="beo-card" style={{ padding: 20 }}>
        {!openCat ? <div style={{ color: "#a39a89" }}>Create a folder to start adding items.</div> : (() => {
          const cat = categories.find(c => c.id === openCat);
          if (!cat) return null;
          return (
            <React.Fragment>
              <div className="beo-serif" style={{ fontSize: 22, fontWeight: 700, color: "#6B1E23", marginBottom: 14 }}>{cat.name}</div>
              {cat.items.length === 0 && <div style={{ color: "#a39a89", fontSize: 14, marginBottom: 10 }}>No items yet.</div>}
              {cat.items.map(item => (
                <div key={item.id} style={{ display: "grid", gridTemplateColumns: "1fr 120px 30px", gap: 8, alignItems: "center", padding: "8px 4px", borderTop: "1px solid #F1EADA" }}>
                  <input className="beo-input" value={item.name} onChange={e => updateItem(cat.id, item.id, { name: e.target.value })} />
                  <input className="beo-input" type="number" value={item.cost} onChange={e => updateItem(cat.id, item.id, { cost: Number(e.target.value) })} />
                  <span style={{ color: "#c98b8e", cursor: "pointer", textAlign: "center" }} onClick={() => removeItem(cat.id, item.id)}>🗑</span>
                </div>
              ))}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 120px auto", gap: 8, alignItems: "center", paddingTop: 10, marginTop: 10, borderTop: "1px dashed #E4DCC8" }}>
                <input className="beo-input" placeholder="New item name" value={itemDraft[cat.id]?.name || ""} onChange={e => setItemDraft(p => ({ ...p, [cat.id]: { ...p[cat.id], name: e.target.value } }))} onKeyDown={e => e.key === "Enter" && addItem(cat.id)} />
                <input className="beo-input" type="number" placeholder="Cost ₹" value={itemDraft[cat.id]?.cost || ""} onChange={e => setItemDraft(p => ({ ...p, [cat.id]: { ...p[cat.id], cost: e.target.value } }))} onKeyDown={e => e.key === "Enter" && addItem(cat.id)} />
                <button className="beo-btn beo-btn-primary" onClick={() => addItem(cat.id)}>＋ Add</button>
              </div>
            </React.Fragment>
          );
        })()}
      </div>
    </div>
  );
}

function BudgetsListView({ budgets, setBudgets, onOpen, onCreate }) {
  const removeBudget = (id) => setBudgets(prev => prev.filter(b => b.id !== id));
  const duplicateBudget = (b) => setBudgets(prev => [{ ...b, id: uid(), name: b.name + " (copy)", createdAt: Date.now() }, ...prev]);
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
        <div className="beo-serif" style={{ fontSize: 22, fontWeight: 700, color: "#6B1E23" }}>Client Budgets</div>
        <button className="beo-btn beo-btn-primary" onClick={onCreate}>＋ New client budget</button>
      </div>
      {budgets.length === 0 ? (
        <div className="beo-card" style={{ padding: 30, textAlign: "center", color: "#a39a89" }}>No client budgets yet.</div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 14 }}>
          {budgets.map(b => {
            const base = (b.lines || []).reduce((s, l) => s + l.cost * l.qty, 0);
            return (
              <div key={b.id} className="beo-card" style={{ padding: 16, cursor: "pointer" }} onClick={() => onOpen(b.id)}>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{b.name}</div>
                <div style={{ fontSize: 12, color: "#8a8071", marginTop: 2 }}>{b.clientName || "No client name"} · {b.date}</div>
                <div style={{ marginTop: 10, fontSize: 13, color: "#6B1E23" }}>Base cost: {inr(base)}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <button className="beo-btn beo-btn-ghost" onClick={(e) => { e.stopPropagation(); duplicateBudget(b); }}>Duplicate</button>
                  <button className="beo-btn beo-btn-ghost" style={{ color: "#c9585d" }} onClick={(e) => { e.stopPropagation(); removeBudget(b.id); }}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function BudgetBuilder({ budget, categories, onBack, onChange }) {
  const [search, setSearch] = useState("");
  if (!budget) return null;
  const update = (patch) => onChange({ ...budget, ...patch });

  const addLine = (catName, item) => {
    const exists = budget.lines.find(l => l.itemRef === item.id);
    if (exists) update({ lines: budget.lines.map(l => l.itemRef === item.id ? { ...l, qty: l.qty + 1 } : l) });
    else update({ lines: [...budget.lines, { id: uid(), itemRef: item.id, category: catName, name: item.name, cost: item.cost, qty: 1 }] });
  };
  const updateLine = (id, patch) => update({ lines: budget.lines.map(l => l.id === id ? { ...l, ...patch } : l) });
  const removeLine = (id) => update({ lines: budget.lines.filter(l => l.id !== id) });

  const baseCost = budget.lines.reduce((s, l) => s + l.cost * l.qty, 0);
  const profit = Number(budget.profit) || 0;
  const commissionPct = Number(budget.commissionPercent) || 0;
  const mode = budget.commissionMode || "final";
  let finalBudget, commissionAmount;
  if (mode === "final") {
    if (commissionPct >= 100) { finalBudget = Infinity; commissionAmount = Infinity; }
    else { finalBudget = (baseCost + profit) / (1 - commissionPct / 100); commissionAmount = finalBudget * (commissionPct / 100); }
  } else {
    commissionAmount = baseCost * (commissionPct / 100);
    finalBudget = baseCost + profit + commissionAmount;
  }

  const filteredCats = categories.map(c => ({ ...c, items: c.items.filter(i => i.name.toLowerCase().includes(search.toLowerCase())) })).filter(c => c.items.length > 0 || !search);

  const exportQuotation = () => {
    const printArea = document.getElementById("print-area");
    const rows = budget.lines.map(l => `<tr><td style="padding:8px 0;border-bottom:1px solid #eee;">${l.name}</td><td style="padding:8px 0;border-bottom:1px solid #eee;text-align:right;">${l.qty}</td></tr>`).join("");
    printArea.innerHTML = `
      <div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:#6B1E23;">The Executive Events</div>
      <div style="font-family:Inter,sans-serif;font-size:13px;color:#8a8071;margin-bottom:20px;">Event Quotation</div>
      <div style="font-family:Inter,sans-serif;font-size:14px;margin-bottom:6px;"><b>Client:</b> ${budget.clientName || "—"}</div>
      <div style="font-family:Inter,sans-serif;font-size:14px;margin-bottom:20px;"><b>Date:</b> ${budget.date}</div>
      <table style="width:100%;border-collapse:collapse;font-family:Inter,sans-serif;font-size:14px;margin-bottom:24px;">
        <thead><tr><th style="text-align:left;border-bottom:2px solid #6B1E23;padding-bottom:8px;">Item / Service</th><th style="text-align:right;border-bottom:2px solid #6B1E23;padding-bottom:8px;">Qty</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="background:#6B1E23;color:#FAF6EE;padding:16px 20px;border-radius:8px;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;">
        Total Budget: ${inr(finalBudget)}
      </div>
    `;
    window.print();
  };

  return (
    <div>
      <button className="beo-btn beo-btn-ghost" onClick={onBack} style={{ marginBottom: 16 }}>← Back to budgets</button>
      <div style={{ display: "flex", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        <input className="beo-input" style={{ fontSize: 18, fontWeight: 600, flex: "1 1 220px" }} value={budget.name} onChange={e => update({ name: e.target.value })} />
        <input className="beo-input" placeholder="Client name" value={budget.clientName} onChange={e => update({ clientName: e.target.value })} style={{ width: 180 }} />
        <input className="beo-input" type="date" value={budget.date} onChange={e => update({ date: e.target.value })} style={{ width: 160 }} />
        <button className="beo-btn beo-btn-gold" onClick={exportQuotation}>📄 Export Quotation</button>
      </div>
      <div className="builder-col">
        <div>
          <div className="beo-card" style={{ padding: 16, marginBottom: 16 }}>
            <input className="beo-input" placeholder="Search items across all folders…" value={search} onChange={e => setSearch(e.target.value)} style={{ marginBottom: 12 }} />
            <div style={{ maxHeight: 320, overflowY: "auto" }}>
              {filteredCats.map(c => (
                <div key={c.id} style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#8a8071", textTransform: "uppercase", margin: "6px 0" }}>{c.name}</div>
                  {c.items.map(item => (
                    <div key={item.id} onClick={() => addLine(c.name, item)} style={{ display: "flex", justifyContent: "space-between", padding: "6px 8px", borderRadius: 6, cursor: "pointer", fontSize: 13.5 }}>
                      <span>{item.name}</span><span style={{ color: "#8a8071" }}>{inr(item.cost)} ＋</span>
                    </div>
                  ))}
                </div>
              ))}
              {filteredCats.length === 0 && <div style={{ color: "#a39a89", fontSize: 13 }}>No items match.</div>}
            </div>
          </div>
          <div className="beo-card" style={{ padding: 16 }}>
            <div style={{ fontWeight: 700, marginBottom: 10 }}>Selected items ({budget.lines.length})</div>
            {budget.lines.length === 0 ? <div style={{ color: "#a39a89", fontSize: 13 }}>Click items on the left to add them.</div> : budget.lines.map(l => (
              <div key={l.id} style={{ display: "grid", gridTemplateColumns: "1fr 60px 90px 90px 24px", gap: 6, alignItems: "center", padding: "6px 4px", borderTop: "1px solid #F1EADA", fontSize: 13 }}>
                <div>{l.name} <span style={{ color: "#a39a89", fontSize: 10.5 }}>({l.category})</span></div>
                <input className="beo-input" type="number" min="1" value={l.qty} onChange={e => updateLine(l.id, { qty: Number(e.target.value) || 1 })} style={{ padding: "5px 6px" }} />
                <input className="beo-input" type="number" value={l.cost} onChange={e => updateLine(l.id, { cost: Number(e.target.value) })} style={{ padding: "5px 6px" }} />
                <div>{inr(l.cost * l.qty)}</div>
                <span style={{ color: "#c98b8e", cursor: "pointer", textAlign: "center" }} onClick={() => removeLine(l.id)}>×</span>
              </div>
            ))}
          </div>
        </div>
        <div className="beo-card" style={{ padding: 20, alignSelf: "start" }}>
          <div className="beo-serif" style={{ fontSize: 20, fontWeight: 700, color: "#6B1E23", marginBottom: 4 }}>Final Budget Calculator</div>
          <div style={{ fontSize: 12, color: "#8a8071", marginBottom: 16 }}>Commission on the final client budget by default.</div>
          <Row label="Base cost (all items)" value={inr(baseCost)} />
          <div style={{ margin: "14px 0" }}>
            <label style={{ fontSize: 12.5, fontWeight: 600 }}>Your desired profit (₹)</label>
            <input className="beo-input" type="number" value={budget.profit} onChange={e => update({ profit: Number(e.target.value) || 0 })} style={{ marginTop: 6 }} />
          </div>
          <div style={{ margin: "14px 0" }}>
            <label style={{ fontSize: 12.5, fontWeight: 600 }}>Hotel commission (%)</label>
            <input className="beo-input" type="number" value={budget.commissionPercent} onChange={e => update({ commissionPercent: Number(e.target.value) || 0 })} style={{ marginTop: 6 }} />
          </div>
          <div style={{ margin: "14px 0" }}>
            <label style={{ fontSize: 12.5, fontWeight: 600, display: "block", marginBottom: 6 }}>Commission is calculated on</label>
            <div style={{ display: "flex", gap: 6 }}>
              <button className="beo-btn" onClick={() => update({ commissionMode: "final" })} style={{ flex: 1, padding: "8px 6px", fontSize: 12.5, borderRadius: 6, background: mode === "final" ? "#6B1E23" : "#F1EADA", color: mode === "final" ? "#FAF6EE" : "#6B1E23" }}>Final client budget</button>
              <button className="beo-btn" onClick={() => update({ commissionMode: "base" })} style={{ flex: 1, padding: "8px 6px", fontSize: 12.5, borderRadius: 6, background: mode === "base" ? "#6B1E23" : "#F1EADA", color: mode === "base" ? "#FAF6EE" : "#6B1E23" }}>Your base cost</button>
            </div>
          </div>
          <div style={{ borderTop: "1px dashed #E4DCC8", margin: "16px 0", paddingTop: 14 }}>
            <Row label="Base cost" value={inr(baseCost)} />
            <Row label="Your profit" value={inr(profit)} />
            <Row label={`Hotel commission (${commissionPct}%)`} value={(commissionPct >= 100 && mode === "final") ? "—" : inr(commissionAmount)} />
          </div>
          <div style={{ background: "#6B1E23", borderRadius: 8, padding: "14px 16px" }}>
            <div style={{ fontSize: 12, color: "#E9D9B8" }}>Quote to client</div>
            <div className="beo-serif" style={{ fontSize: 28, fontWeight: 700, color: "#FAF6EE" }}>
              {(commissionPct >= 100 && mode === "final") ? "Set commission < 100%" : inr(finalBudget)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================= HOTELS (city-wise database) ============================= */

function HotelsView({ cities, setCities, onOpenHotel }) {
  const [openCityId, setOpenCityId] = useState(cities[0]?.id || null);
  const [newCityName, setNewCityName] = useState("");
  const [newCityRegion, setNewCityRegion] = useState("");
  const [newCityCountry, setNewCityCountry] = useState("India");
  const [newHotelName, setNewHotelName] = useState("");
  const [search, setSearch] = useState("");
  const [countryFilter, setCountryFilter] = useState("All");
  const [regionFilter, setRegionFilter] = useState("All");
  const [brandFilter, setBrandFilter] = useState("All");
  const [editingRegionId, setEditingRegionId] = useState(null);
  const [editRegionDraft, setEditRegionDraft] = useState("");
  const [editCountryDraft, setEditCountryDraft] = useState("");

  useEffect(() => { if ((!openCityId || !cities.find(c => c.id === openCityId)) && cities[0]) setOpenCityId(cities[0].id); }, [cities]);

  const cityCountry = (c) => (c.country && c.country.trim()) ? c.country.trim() : "India";
  const cityRegion = (c) => (c.region && c.region.trim()) ? c.region.trim() : "Unassigned";

  const allCountries = Array.from(new Set(cities.map(cityCountry)));
  if (allCountries.length === 0) allCountries.push("India");
  const countryOptions = ["All", ...allCountries];

  const regionsForCountry = Array.from(new Set(
    cities.filter(c => countryFilter === "All" || cityCountry(c) === countryFilter).map(cityRegion)
  ));
  const regionOptions = ["All", ...regionsForCountry];

  const allBrands = Array.from(new Set(
    cities.flatMap(c => c.hotels.map(h => (h.brand || "").trim())).filter(Boolean)
  )).sort();
  const brandOptions = ["All", ...allBrands];

  const q = search.trim().toLowerCase();
  const filtersActive = q.length > 0 || countryFilter !== "All" || regionFilter !== "All" || brandFilter !== "All";

  const filteredResults = filtersActive ? cities.flatMap(c => {
    if (countryFilter !== "All" && cityCountry(c) !== countryFilter) return [];
    if (regionFilter !== "All" && cityRegion(c) !== regionFilter) return [];
    const cityNameMatches = q.length > 0 && c.name.toLowerCase().includes(q);
    return c.hotels
      .filter(h => {
        if (brandFilter !== "All" && (h.brand || "").trim() !== brandFilter) return false;
        if (q.length === 0) return true;
        return cityNameMatches || h.name.toLowerCase().includes(q);
      })
      .map(h => ({ ...h, __cityId: c.id, __cityName: c.name }));
  }) : [];

  const addCity = () => {
    if (!newCityName.trim()) return;
    const c = { id: uid(), name: newCityName.trim(), region: newCityRegion.trim(), country: newCityCountry.trim() || "India", hotels: [] };
    setCities(prev => [...prev, c]);
    setNewCityName(""); setNewCityRegion(""); setOpenCityId(c.id);
  };
  const removeCity = (id) => setCities(prev => prev.filter(c => c.id !== id));

  const saveRegionEdit = (cityId) => {
    setCities(prev => prev.map(c => c.id === cityId ? { ...c, region: editRegionDraft.trim(), country: editCountryDraft.trim() || "India" } : c));
    setEditingRegionId(null);
  };

  const addHotel = (cityId) => {
    const name = newHotelName.trim();
    if (!name) return;
    const dupe = cities.flatMap(c => c.hotels.map(h => ({ h, cName: c.name }))).find(({ h }) => h.name.trim().toLowerCase() === name.toLowerCase());
    if (dupe && !window.confirm(`A hotel named "${dupe.h.name}" already exists in ${dupe.cName}. Add "${name}" here anyway?`)) return;
    const h = {
      id: uid(), name: name, description: "", brand: "", mapUrl: "",
      photos: [], documents: [],
      salesManager: { name: "", phone: "" },
      altContact: { name: "", phone: "" },
      status: "Not contacted", lastContactedDate: "", notes: []
    };
    setCities(prev => prev.map(c => c.id === cityId ? { ...c, hotels: [...c.hotels, h] } : c));
    setNewHotelName("");
  };
  const removeHotel = (cityId, hotelId) => setCities(prev => prev.map(c => c.id === cityId ? { ...c, hotels: c.hotels.filter(h => h.id !== hotelId) } : c));

  const exportCsv = () => {
    const rows = [["Country", "Region", "City/Area", "Hotel", "Brand", "Status", "Last Contacted", "Sales Manager", "Sales Phone", "Alt Contact", "Alt Phone", "Description"]];
    cities.forEach(c => {
      c.hotels.forEach(h => {
        rows.push([
          cityCountry(c), cityRegion(c), c.name, h.name, h.brand || "", h.status || "Not contacted", h.lastContactedDate || "",
          h.salesManager?.name || "", h.salesManager?.phone || "", h.altContact?.name || "", h.altContact?.phone || "",
          (h.description || "").replace(/\n/g, " ")
        ]);
      });
    });
    const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\r\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "hotel_database.csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const openCity = cities.find(c => c.id === openCityId);

  const groupedByRegion = {};
  cities.forEach(c => {
    const r = cityRegion(c);
    if (!groupedByRegion[r]) groupedByRegion[r] = [];
    groupedByRegion[r].push(c);
  });
  const regionGroupNames = Object.keys(groupedByRegion).sort((a, b) => (a === "Unassigned" ? 1 : b === "Unassigned" ? -1 : a.localeCompare(b)));

  return (
    <div>
      <div className="beo-card" style={{ padding: 14, marginBottom: 12 }}>
        <input
          className="beo-input"
          placeholder="Search by hotel name or city (e.g. 'Taj' or 'East Delhi')…"
          value={search}
          onChange={e => setSearch(e.target.value)}
          style={{ fontSize: 14 }}
        />
      </div>

      <div className="beo-card" style={{ padding: 14, marginBottom: 16, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
        <div style={{ fontSize: 11.5, fontWeight: 700, color: "#8a8071", textTransform: "uppercase" }}>Filters:</div>
        <select className="beo-input" style={{ width: "auto", minWidth: 140 }} value={countryFilter} onChange={e => { setCountryFilter(e.target.value); setRegionFilter("All"); }}>
          {countryOptions.map(o => <option key={o} value={o}>{o === "All" ? "All Countries" : o}</option>)}
        </select>
        <select className="beo-input" style={{ width: "auto", minWidth: 160 }} value={regionFilter} onChange={e => setRegionFilter(e.target.value)}>
          {regionOptions.map(o => <option key={o} value={o}>{o === "All" ? "All Regions" : o}</option>)}
        </select>
        <select className="beo-input" style={{ width: "auto", minWidth: 160 }} value={brandFilter} onChange={e => setBrandFilter(e.target.value)}>
          {brandOptions.map(o => <option key={o} value={o}>{o === "All" ? "All Brands" : o}</option>)}
        </select>
        {filtersActive && (
          <button className="beo-btn beo-btn-ghost" onClick={() => { setSearch(""); setCountryFilter("All"); setRegionFilter("All"); setBrandFilter("All"); }}>Clear filters</button>
        )}
        <button className="beo-btn beo-btn-gold" style={{ marginLeft: "auto" }} onClick={exportCsv}>⬇ Export CSV</button>
      </div>

      {filtersActive ? (
        <div className="beo-card" style={{ padding: 20 }}>
          <div className="beo-serif" style={{ fontSize: 20, fontWeight: 700, color: "#6B1E23", marginBottom: 4 }}>
            {filteredResults.length} result{filteredResults.length === 1 ? "" : "s"}
          </div>
          <div style={{ fontSize: 12, color: "#8a8071", marginBottom: 16 }}>Clear filters to go back to browsing by region/city.</div>
          {filteredResults.length === 0 ? (
            <div style={{ color: "#a39a89" }}>No hotels match these filters.</div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12 }}>
              {filteredResults.map(h => (
                <div key={h.id} className="beo-card" style={{ padding: 14, cursor: "pointer", position: "relative" }} onClick={() => onOpenHotel(h.__cityId, h.id)}>
                  {h.photos && h.photos[0] && (
                    <img src={h.photos[0]} alt="" style={{ width: "100%", height: 100, objectFit: "cover", borderRadius: 6, marginBottom: 8 }} onError={e => e.target.style.display = "none"} />
                  )}
                  <div style={{ fontSize: 11, color: "#B8934A", fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>📍 {h.__cityName}</div>
                  <div style={{ fontWeight: 700, fontSize: 14.5 }}>{h.name}</div>
                  {h.brand && <div style={{ fontSize: 11, color: "#6B1E23", fontWeight: 600, marginTop: 2 }}>{h.brand}</div>}
                  <div style={{ fontSize: 11.5, color: "#8a8071", marginTop: 3 }}>
                    {h.salesManager?.name ? `Sales: ${h.salesManager.name}` : "No sales contact yet"}
                  </div>
                  <span style={{ display: "inline-block", marginTop: 6, fontSize: 10.5, fontWeight: 700, padding: "2px 8px", borderRadius: 10, background: statusColor(h.status).bg, color: statusColor(h.status).fg }}>{h.status || "Not contacted"}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      ) : (
        <div className="two-col">
          <div className="beo-card" style={{ padding: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#8a8071", textTransform: "uppercase", marginBottom: 10 }}>Cities, by region</div>
            {regionGroupNames.map(region => (
              <div key={region} style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#B8934A", textTransform: "uppercase", margin: "8px 0 4px" }}>📁 {region}</div>
                {groupedByRegion[region].map(c => (
                  <div key={c.id}>
                    <div onClick={() => setOpenCityId(c.id)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", borderRadius: 6, cursor: "pointer", background: openCityId === c.id ? "#F1EADA" : "transparent", marginBottom: 2 }}>
                      <span style={{ fontSize: 14 }}>📍 {c.name} <span style={{ fontSize: 11, color: "#a39a89" }}>({c.hotels.length})</span></span>
                      <span style={{ display: "flex", gap: 6 }}>
                        <span style={{ color: "#B8934A", cursor: "pointer", fontSize: 12 }} onClick={(e) => { e.stopPropagation(); setEditingRegionId(c.id); setEditRegionDraft(c.region || ""); setEditCountryDraft(c.country || "India"); }}>✎</span>
                        <span style={{ color: "#c98b8e", cursor: "pointer" }} onClick={(e) => { e.stopPropagation(); removeCity(c.id); }}>🗑</span>
                      </span>
                    </div>
                    {editingRegionId === c.id && (
                      <div style={{ padding: "6px 10px 10px", background: "#FAF6EE", borderRadius: 6, marginBottom: 6 }}>
                        <input className="beo-input" placeholder="Region (e.g. Delhi NCR)" value={editRegionDraft} onChange={e => setEditRegionDraft(e.target.value)} style={{ marginBottom: 6, fontSize: 12.5 }} />
                        <input className="beo-input" placeholder="Country" value={editCountryDraft} onChange={e => setEditCountryDraft(e.target.value)} style={{ marginBottom: 6, fontSize: 12.5 }} />
                        <div style={{ display: "flex", gap: 6 }}>
                          <button className="beo-btn beo-btn-primary" style={{ fontSize: 12, padding: "6px 10px" }} onClick={() => saveRegionEdit(c.id)}>Save</button>
                          <button className="beo-btn beo-btn-ghost" style={{ fontSize: 12, padding: "6px 10px" }} onClick={() => setEditingRegionId(null)}>Cancel</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            ))}
            <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px dashed #E4DCC8" }}>
              <div style={{ fontSize: 11, color: "#a39a89", marginBottom: 6 }}>Add new city/area</div>
              <input className="beo-input" placeholder="Region (e.g. Delhi NCR, Jaipur)" value={newCityRegion} onChange={e => setNewCityRegion(e.target.value)} style={{ marginBottom: 6, fontSize: 13 }} />
              <input className="beo-input" placeholder="Country" value={newCityCountry} onChange={e => setNewCityCountry(e.target.value)} style={{ marginBottom: 6, fontSize: 13 }} />
              <div style={{ display: "flex", gap: 6 }}>
                <input className="beo-input" placeholder="City/area name (e.g. East Delhi)" value={newCityName} onChange={e => setNewCityName(e.target.value)} onKeyDown={e => e.key === "Enter" && addCity()} style={{ fontSize: 13 }} />
                <button className="beo-btn beo-btn-gold" onClick={addCity}>＋</button>
              </div>
            </div>
          </div>
          <div className="beo-card" style={{ padding: 20 }}>
            {!openCity ? <div style={{ color: "#a39a89" }}>Create a city to start adding hotels.</div> : (
              <React.Fragment>
                <div className="beo-serif" style={{ fontSize: 22, fontWeight: 700, color: "#6B1E23", marginBottom: 2 }}>{openCity.name}</div>
                <div style={{ fontSize: 12, color: "#8a8071", marginBottom: 14 }}>{cityRegion(openCity)} · {cityCountry(openCity)}</div>
                {openCity.hotels.length === 0 && <div style={{ color: "#a39a89", fontSize: 14, marginBottom: 14 }}>No hotels yet in this city.</div>}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12, marginBottom: 18 }}>
                  {openCity.hotels.map(h => (
                    <div key={h.id} className="beo-card" style={{ padding: 14, cursor: "pointer", position: "relative" }} onClick={() => onOpenHotel(openCity.id, h.id)}>
                      {h.photos && h.photos[0] && (
                        <img src={h.photos[0]} alt="" style={{ width: "100%", height: 100, objectFit: "cover", borderRadius: 6, marginBottom: 8 }} onError={e => e.target.style.display = "none"} />
                      )}
                      <div style={{ fontWeight: 700, fontSize: 14.5 }}>{h.name}</div>
                      {h.brand && <div style={{ fontSize: 11, color: "#6B1E23", fontWeight: 600, marginTop: 2 }}>{h.brand}</div>}
                      <div style={{ fontSize: 11.5, color: "#8a8071", marginTop: 3 }}>
                        {h.salesManager?.name ? `Sales: ${h.salesManager.name}` : "No sales contact yet"}
                      </div>
                      <span style={{ display: "inline-block", marginTop: 6, fontSize: 10.5, fontWeight: 700, padding: "2px 8px", borderRadius: 10, background: statusColor(h.status).bg, color: statusColor(h.status).fg }}>{h.status || "Not contacted"}</span>
                      <span style={{ position: "absolute", top: 10, right: 10, color: "#c98b8e", cursor: "pointer" }} onClick={(e) => { e.stopPropagation(); removeHotel(openCity.id, h.id); }}>🗑</span>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 8, paddingTop: 10, borderTop: "1px dashed #E4DCC8" }}>
                  <input className="beo-input" placeholder="New hotel name" value={newHotelName} onChange={e => setNewHotelName(e.target.value)} onKeyDown={e => e.key === "Enter" && addHotel(openCity.id)} />
                  <button className="beo-btn beo-btn-primary" onClick={() => addHotel(openCity.id)}>＋ Add hotel</button>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function HotelDetail({ city, hotel, quotes, onOpenQuote, onBack, onChange }) {
  const [photoIdx, setPhotoIdx] = useState(0);
  const [newPhotoUrl, setNewPhotoUrl] = useState("");
  const [newDocLabel, setNewDocLabel] = useState("");
  const [newDocUrl, setNewDocUrl] = useState("");
  const [newNoteText, setNewNoteText] = useState("");

  if (!hotel) return null;
  const update = (patch) => onChange({ ...hotel, ...patch });
  const photos = hotel.photos || [];
  const documents = hotel.documents || [];
  const notes = hotel.notes || [];
  const relatedQuotes = (quotes || []).filter(q => q.hotelId === hotel.id).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  const addNote = () => {
    if (!newNoteText.trim()) return;
    const note = { id: uid(), date: new Date().toISOString().slice(0, 10), text: newNoteText.trim() };
    update({ notes: [note, ...notes] });
    setNewNoteText("");
  };
  const removeNote = (id) => update({ notes: notes.filter(n => n.id !== id) });

  const addPhoto = () => {
    if (!newPhotoUrl.trim()) return;
    update({ photos: [...photos, newPhotoUrl.trim()] });
    setNewPhotoUrl("");
  };
  const removePhoto = (i) => {
    update({ photos: photos.filter((_, idx) => idx !== i) });
    setPhotoIdx(0);
  };
  const addDoc = () => {
    if (!newDocUrl.trim() || documents.length >= 4) return;
    update({ documents: [...documents, { id: uid(), label: newDocLabel.trim() || "Document", url: newDocUrl.trim() }] });
    setNewDocLabel(""); setNewDocUrl("");
  };
  const removeDoc = (id) => update({ documents: documents.filter(d => d.id !== id) });

  const exportProfile = () => {
    const printArea = document.getElementById("print-area");
    const docRows = documents.map(d => `<div style="margin-bottom:4px;">📄 ${d.label}: ${d.url}</div>`).join("");
    const noteRows = notes.map(n => `<div style="margin-bottom:4px;"><b>${n.date}:</b> ${n.text}</div>`).join("");
    printArea.innerHTML = `
      <div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:#6B1E23;">${hotel.name}</div>
      <div style="font-family:Inter,sans-serif;font-size:13px;color:#8a8071;margin-bottom:16px;">${hotel.brand || ""} ${city ? "· " + city.name : ""}</div>

      <div className="beo-card" style={{ padding: 20, marginTop: 16 }}>

function QuotesListView({ quotes, setQuotes, onOpen, onCreate, cities }) {
  const removeQuote = (id) => setQuotes(prev => prev.filter(q => q.id !== id));
  const hotelName = (q) => {
    const c = cities.find(c => c.id === q.cityId);
    const h = c && c.hotels.find(h => h.id === q.hotelId);
    return h ? h.name : "No hotel selected";
  };
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
        <div className="beo-serif" style={{ fontSize: 22, fontWeight: 700, color: "#6B1E23" }}>Corporate Quotes</div>
        <button className="beo-btn beo-btn-primary" onClick={onCreate}>＋ New corporate quote</button>
      </div>
      {quotes.length === 0 ? (
        <div className="beo-card" style={{ padding: 30, textAlign: "center", color: "#a39a89" }}>No corporate quotes yet.</div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 14 }}>
          {quotes.map(q => (
            <div key={q.id} className="beo-card" style={{ padding: 16, cursor: "pointer" }} onClick={() => onOpen(q.id)}>
              <div style={{ fontWeight: 700, fontSize: 15 }}>{q.name}</div>
              <div style={{ fontSize: 12, color: "#8a8071", marginTop: 2 }}>{q.clientName || "No client name"} · {q.date}</div>
              <div style={{ fontSize: 12.5, color: "#6B1E23", marginTop: 8 }}>🏨 {hotelName(q)}</div>
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button className="beo-btn beo-btn-ghost" style={{ color: "#c9585d" }} onClick={(e) => { e.stopPropagation(); removeQuote(q.id); }}>Delete</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CorporateQuoteBuilder({ quote, cities, onBack, onChange }) {
  if (!quote) return null;
  const update = (patch) => onChange({ ...quote, ...patch });

  const city = cities.find(c => c.id === quote.cityId);
  const hotel = city && city.hotels.find(h => h.id === quote.hotelId);

  const rooms = quote.rooms || { qty: 0, rate: 0, nights: 1 };
  const banquet = quote.banquet || { mode: "flat", pax: 0, rate: 0 };
  const extraLines = quote.extraLines || [];

  const roomsTotal = (Number(rooms.qty) || 0) * (Number(rooms.rate) || 0) * (Number(rooms.nights) || 0);
  const banquetTotal = banquet.mode === "perPax" ? (Number(banquet.pax) || 0) * (Number(banquet.rate) || 0) : (Number(banquet.rate) || 0);
  const extraTotal = extraLines.reduce((s, l) => s + (Number(l.qty) || 0) * (Number(l.rate) || 0), 0);
  const baseCost = roomsTotal + banquetTotal + extraTotal;

  const profit = Number(quote.profit) || 0;
  const commissionPct = Number(quote.commissionPercent) || 0;
  const mode = quote.commissionMode || "final";
  let finalBudget, commissionAmount;
  if (mode === "final") {
    if (commissionPct >= 100) { finalBudget = Infinity; commissionAmount = Infinity; }
    else { finalBudget = (baseCost + profit) / (1 - commissionPct / 100); commissionAmount = finalBudget * (commissionPct / 100); }
  } else {
    commissionAmount = baseCost * (commissionPct / 100);
    finalBudget = baseCost + profit + commissionAmount;
  }

  const addExtraLine = () => update({ extraLines: [...extraLines, { id: uid(), label: "", qty: 1, rate: 0 }] });
  const updateExtraLine = (id, patch) => update({ extraLines: extraLines.map(l => l.id === id ? { ...l, ...patch } : l) });
  const removeExtraLine = (id) => update({ extraLines: extraLines.filter(l => l.id !== id) });

  const selectCity = (cityId) => update({ cityId, hotelId: "" });
  const selectHotel = (hotelId) => update({ hotelId });
  const currency = quote.currency || "₹";
  const cur = (n) => fmtCurrency(n, currency);

  const exportQuotation = () => {
    const printArea = document.getElementById("print-area");
    const lineRows = [
      rooms.qty ? `<tr><td style="padding:8px 0;border-bottom:1px solid #eee;">Rooms (${rooms.qty} rooms × ${rooms.nights} night${rooms.nights == 1 ? "" : "s"})</td><td></td></tr>` : "",
      banquet.rate ? `<tr><td style="padding:8px 0;border-bottom:1px solid #eee;">Banquet${banquet.mode === "perPax" ? ` (${banquet.pax} pax)` : ""}</td><td></td></tr>` : "",
      ...extraLines.filter(l => l.label).map(l => `<tr><td style="padding:8px 0;border-bottom:1px solid #eee;">${l.label}</td><td style="padding:8px 0;border-bottom:1px solid #eee;text-align:right;">${l.qty}</td></tr>`)
    ].filter(Boolean).join("");
    printArea.innerHTML = `
      <div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:#6B1E23;">The Executive Events</div>
      <div style="font-family:Inter,sans-serif;font-size:13px;color:#8a8071;margin-bottom:20px;">Corporate Event Quotation</div>
      <div style="font-family:Inter,sans-serif;font-size:14px;margin-bottom:4px;"><b>Client:</b> ${quote.clientName || "—"}</div>
      <div style="font-family:Inter,sans-serif;font-size:14px;margin-bottom:4px;"><b>Venue:</b> ${hotel ? hotel.name : "—"}${city ? " · " + city.name : ""}</div>
      <div style="font-family:Inter,sans-serif;font-size:14px;margin-bottom:20px;"><b>Date:</b> ${quote.date}</div>
      <table style="width:100%;border-collapse:collapse;font-family:Inter,sans-serif;font-size:14px;margin-bottom:24px;">
        <thead><tr><th style="text-align:left;border-bottom:2px solid #6B1E23;padding-bottom:8px;">Item / Service</th><th style="text-align:right;border-bottom:2px solid #6B1E23;padding-bottom:8px;">Qty</th></tr></thead>
        <tbody>${lineRows}</tbody>
      </table>
      <div style="background:#6B1E23;color:#FAF6EE;padding:16px 20px;border-radius:8px;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;">
        Total Budget: ${cur(finalBudget)}
      </div>
    `;
    window.print();
  };

  return (
    <div>
      <button className="beo-btn beo-btn-ghost" onClick={onBack} style={{ marginBottom: 16 }}>← Back to corporate quotes</button>
      <div style={{ display: "flex", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        <input className="beo-input" style={{ fontSize: 18, fontWeight: 600, flex: "1 1 220px" }} value={quote.name} onChange={e => update({ name: e.target.value })} />
        <input className="beo-input" placeholder="Client name" value={quote.clientName} onChange={e => update({ clientName: e.target.value })} style={{ width: 180 }} />
        <input className="beo-input" type="date" value={quote.date} onChange={e => update({ date: e.target.value })} style={{ width: 160 }} />
        <select className="beo-input" style={{ width: 90 }} value={currency} onChange={e => update({ currency: e.target.value })}>
          {CURRENCY_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <button className="beo-btn beo-btn-gold" onClick={exportQuotation}>📄 Export Quotation</button>
      </div>

      <div className="builder-col">
        <div>
          <div className="beo-card" style={{ padding: 16, marginBottom: 16 }}>
            <div style={{ fontWeight: 700, marginBottom: 10 }}>Venue</div>
            <div style={{ display: "flex", gap: 8, marginBottom: hotel ? 12 : 0, flexWrap: "wrap" }}>
              <select className="beo-input" style={{ flex: 1 }} value={quote.cityId || ""} onChange={e => selectCity(e.target.value)}>
                <option value="">Select city…</option>
                {cities.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <select className="beo-input" style={{ flex: 1 }} value={quote.hotelId || ""} onChange={e => selectHotel(e.target.value)} disabled={!city}>
                <option value="">Select hotel…</option>
                {city && city.hotels.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
              </select>
            </div>
            {hotel && (
              <div style={{ background: "#FAF6EE", borderRadius: 8, padding: 12, fontSize: 13 }}>
                <div style={{ fontWeight: 700, marginBottom: 4 }}>{hotel.name}</div>
                {hotel.description && <div style={{ color: "#8a8071", marginBottom: 6, fontSize: 12.5 }}>{hotel.description.slice(0, 160)}{hotel.description.length > 160 ? "…" : ""}</div>}
                {hotel.salesManager?.name && <div style={{ fontSize: 12 }}>📞 {hotel.salesManager.name} — {hotel.salesManager.phone}</div>}
              </div>
            )}
          </div>

          <div className="beo-card" style={{ padding: 16, marginBottom: 16 }}>
            <div style={{ fontWeight: 700, marginBottom: 10 }}>Rooms</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              <div>
                <label style={{ fontSize: 11.5, color: "#8a8071" }}>Rooms</label>
                <input className="beo-input" type="number" value={rooms.qty} onChange={e => update({ rooms: { ...rooms, qty: Number(e.target.value) || 0 } })} />
              </div>
              <div>
                <label style={{ fontSize: 11.5, color: "#8a8071" }}>Rate / night (₹)</label>
                <input className="beo-input" type="number" value={rooms.rate} onChange={e => update({ rooms: { ...rooms, rate: Number(e.target.value) || 0 } })} />
              </div>
              <div>
                <label style={{ fontSize: 11.5, color: "#8a8071" }}>Nights</label>
                <input className="beo-input" type="number" value={rooms.nights} onChange={e => update({ rooms: { ...rooms, nights: Number(e.target.value) || 0 } })} />
              </div>
            </div>
            <div style={{ textAlign: "right", fontSize: 13, marginTop: 8, color: "#6B1E23", fontWeight: 600 }}>Rooms total: {cur(roomsTotal)}</div>
          </div>

          <div className="beo-card" style={{ padding: 16, marginBottom: 16 }}>
            <div style={{ fontWeight: 700, marginBottom: 10 }}>Banquet</div>
            <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
              <button className="beo-btn" onClick={() => update({ banquet: { ...banquet, mode: "flat" } })} style={{ flex: 1, padding: "8px 6px", fontSize: 12.5, borderRadius: 6, background: banquet.mode === "flat" ? "#6B1E23" : "#F1EADA", color: banquet.mode === "flat" ? "#FAF6EE" : "#6B1E23" }}>Flat cost</button>
              <button className="beo-btn" onClick={() => update({ banquet: { ...banquet, mode: "perPax" } })} style={{ flex: 1, padding: "8px 6px", fontSize: 12.5, borderRadius: 6, background: banquet.mode === "perPax" ? "#6B1E23" : "#F1EADA", color: banquet.mode === "perPax" ? "#FAF6EE" : "#6B1E23" }}>Per pax</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: banquet.mode === "perPax" ? "1fr 1fr" : "1fr", gap: 8 }}>
              {banquet.mode === "perPax" && (
                <div>
                  <label style={{ fontSize: 11.5, color: "#8a8071" }}>Pax</label>
                  <input className="beo-input" type="number" value={banquet.pax} onChange={e => update({ banquet: { ...banquet, pax: Number(e.target.value) || 0 } })} />
                </div>
              )}
              <div>
                <label style={{ fontSize: 11.5, color: "#8a8071" }}>{banquet.mode === "perPax" ? "Rate per pax (₹)" : "Flat banquet cost (₹)"}</label>
                <input className="beo-input" type="number" value={banquet.rate} onChange={e => update({ banquet: { ...banquet, rate: Number(e.target.value) || 0 } })} />
              </div>
            </div>
            <div style={{ textAlign: "right", fontSize: 13, marginTop: 8, color: "#6B1E23", fontWeight: 600 }}>Banquet total: {cur(banquetTotal)}</div>
          </div>

          <div className="beo-card" style={{ padding: 16 }}>
            <div style={{ fontWeight: 700, marginBottom: 10 }}>Other items (F&B, transport, decor, misc.)</div>
            {extraLines.length === 0 && <div style={{ color: "#a39a89", fontSize: 13, marginBottom: 8 }}>No extra items yet.</div>}
            {extraLines.map(l => (
              <div key={l.id} style={{ display: "grid", gridTemplateColumns: "1fr 60px 100px 90px 24px", gap: 6, alignItems: "center", padding: "6px 4px", borderTop: "1px solid #F1EADA", fontSize: 13 }}>
                <input className="beo-input" placeholder="Label" value={l.label} onChange={e => updateExtraLine(l.id, { label: e.target.value })} style={{ padding: "5px 6px" }} />
                <input className="beo-input" type="number" placeholder="Qty" value={l.qty} onChange={e => updateExtraLine(l.id, { qty: Number(e.target.value) || 0 })} style={{ padding: "5px 6px" }} />
                <input className="beo-input" type="number" placeholder="Rate ₹" value={l.rate} onChange={e => updateExtraLine(l.id, { rate: Number(e.target.value) || 0 })} style={{ padding: "5px 6px" }} />
                <div>{cur((Number(l.qty) || 0) * (Number(l.rate) || 0))}</div>
                <span style={{ color: "#c98b8e", cursor: "pointer", textAlign: "center" }} onClick={() => removeExtraLine(l.id)}>×</span>
              </div>
            ))}
            <button className="beo-btn beo-btn-ghost" onClick={addExtraLine} style={{ marginTop: 10 }}>＋ Add item</button>
          </div>
        </div>

        <div className="beo-card" style={{ padding: 20, alignSelf: "start" }}>
          <div className="beo-serif" style={{ fontSize: 20, fontWeight: 700, color: "#6B1E23", marginBottom: 4 }}>Final Budget Calculator</div>
          <div style={{ fontSize: 12, color: "#8a8071", marginBottom: 16 }}>Commission on the final client budget by default.</div>
          <Row label="Rooms" value={cur(roomsTotal)} />
          <Row label="Banquet" value={cur(banquetTotal)} />
          <Row label="Other items" value={cur(extraTotal)} />
          <div style={{ borderTop: "1px dashed #E4DCC8", margin: "10px 0" }} />
          <Row label="Base cost (total)" value={cur(baseCost)} />
          <div style={{ margin: "14px 0" }}>
            <label style={{ fontSize: 12.5, fontWeight: 600 }}>Your desired profit (₹)</label>
            <input className="beo-input" type="number" value={quote.profit} onChange={e => update({ profit: Number(e.target.value) || 0 })} style={{ marginTop: 6 }} />
          </div>
          <div style={{ margin: "14px 0" }}>
            <label style={{ fontSize: 12.5, fontWeight: 600 }}>Hotel commission (%)</label>
            <input className="beo-input" type="number" value={quote.commissionPercent} onChange={e => update({ commissionPercent: Number(e.target.value) || 0 })} style={{ marginTop: 6 }} />
          </div>
          <div style={{ margin: "14px 0" }}>
            <label style={{ fontSize: 12.5, fontWeight: 600, display: "block", marginBottom: 6 }}>Commission is calculated on</label>
            <div style={{ display: "flex", gap: 6 }}>
              <button className="beo-btn" onClick={() => update({ commissionMode: "final" })} style={{ flex: 1, padding: "8px 6px", fontSize: 12.5, borderRadius: 6, background: mode === "final" ? "#6B1E23" : "#F1EADA", color: mode === "final" ? "#FAF6EE" : "#6B1E23" }}>Final client budget</button>
              <button className="beo-btn" onClick={() => update({ commissionMode: "base" })} style={{ flex: 1, padding: "8px 6px", fontSize: 12.5, borderRadius: 6, background: mode === "base" ? "#6B1E23" : "#F1EADA", color: mode === "base" ? "#FAF6EE" : "#6B1E23" }}>Your base cost</button>
            </div>
          </div>
          <div style={{ borderTop: "1px dashed #E4DCC8", margin: "16px 0", paddingTop: 14 }}>
            <Row label="Base cost" value={cur(baseCost)} />
            <Row label="Your profit" value={cur(profit)} />
            <Row label={`Hotel commission (${commissionPct}%)`} value={(commissionPct >= 100 && mode === "final") ? "—" : cur(commissionAmount)} />
          </div>
          <div style={{ background: "#6B1E23", borderRadius: 8, padding: "14px 16px" }}>
            <div style={{ fontSize: 12, color: "#E9D9B8" }}>Quote to client</div>
            <div className="beo-serif" style={{ fontSize: 28, fontWeight: 700, color: "#FAF6EE" }}>
              {(commissionPct >= 100 && mode === "final") ? "Set commission < 100%" : cur(finalBudget)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Row({ label, value }) {
  return <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5, padding: "4px 0" }}><span style={{ color: "#8a8071" }}>{label}</span><span style={{ fontWeight: 600 }}>{value}</span></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
