<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>BEO Costing Ledger</title>
<link rel="icon" href="data:,">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Inter',sans-serif; background:#FAF6EE; color:#211D17; }
  .beo-serif { font-family:'Cormorant Garamond', serif; }
  .beo-btn { display:inline-flex; align-items:center; gap:6px; border:none; cursor:pointer; border-radius:6px; font-family:inherit; font-weight:600; transition:all .15s ease; }
  .beo-btn:active { transform:scale(0.97); }
  .beo-btn-primary { background:#6B1E23; color:#FAF6EE; padding:9px 16px; font-size:14px; }
  .beo-btn-primary:hover { background:#5a191d; }
  .beo-btn-gold { background:#B8934A; color:#211D17; padding:9px 16px; font-size:14px; }
  .beo-btn-gold:hover { background:#a68140; }
  .beo-btn-ghost { background:transparent; color:#6B1E23; padding:6px 10px; font-size:13px; border:1px solid #E4DCC8; }
  .beo-btn-ghost:hover { background:#F1EADA; }
  .beo-input { border:1px solid #E4DCC8; background:#fff; border-radius:6px; padding:8px 10px; font-family:inherit; font-size:14px; color:#211D17; width:100%; }
  .beo-input:focus { outline:2px solid #B8934A; outline-offset:1px; }
  .beo-card { background:#fff; border:1px solid #EDE6D6; border-radius:10px; }
  .two-col { display:grid; grid-template-columns:260px 1fr; gap:20px; }
  .builder-col { display:grid; grid-template-columns:1fr 380px; gap:20px; }
  @media (max-width:800px) {
    .two-col, .builder-col { grid-template-columns: 1fr !important; }
  }
  #print-area { display:none; }
  @media print {
    body * { visibility:hidden; }
    #print-area, #print-area * { visibility:visible; }
    #print-area { display:block !important; position:absolute; top:0; left:0; width:100%; padding:30px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="print-area"></div>

    projectId: "beo-ledger",
    storageBucket: "beo-ledger.firebasestorage.app",
    messagingSenderId: "509974350492",
    appId: "1:509974350492:web:6b2a6d608f8938a4cd3b59"
  };
  firebase.initializeApp(firebaseConfig);
  window.__auth = firebase.auth();
  window.__db = firebase.firestore();

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-type="module">
const { useState, useEffect, useRef } = React;
const auth = window.__auth;
const db = window.__db;

const DEFAULT_CATEGORIES = ["Entries", "SFX", "Welcome", "Itineraries", "Hotels", "Live Band", "Games", "Stationery"];
const uid = () => Math.random().toString(36).slice(2, 10);
const inr = (n) => "₹" + (Number(n) || 0).toLocaleString("en-IN", { maximumFractionDigits: 0 });

function App() {
  const [user, setUser] = useState(undefined);
  const [authError, setAuthError] = useState("");

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setUser(u || null));
    return unsub;
  }, []);

  if (user === undefined) return <div style={{ padding: 40, color: "#6b1e23" }}>Checking sign-in…</div>;
  if (user === null) return <LoginScreen onError={setAuthError} error={authError} />;
  return <MainApp user={user} />;
}

function LoginScreen({ onError, error }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);

  const signIn = async () => {
    setBusy(true); onError("");
    try {
      await auth.signInWithEmailAndPassword(email.trim(), password);
    } catch (e) {
      onError(e.message || "Sign-in failed. Check your email and password.");
    }
    setBusy(false);
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div className="beo-card" style={{ padding: 30, maxWidth: 360, width: "100%" }}>
        <div className="beo-serif" style={{ fontSize: 26, fontWeight: 700, color: "#6B1E23", marginBottom: 4 }}>BEO Costing Ledger</div>
        <div style={{ fontSize: 12.5, color: "#8a8071", marginBottom: 20 }}>Sign in with the account you created in Firebase.</div>
        <input className="beo-input" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} style={{ marginBottom: 10 }} />
        <input className="beo-input" placeholder="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && signIn()} style={{ marginBottom: 14 }} />
        {error && <div style={{ color: "#c9585d", fontSize: 12.5, marginBottom: 10 }}>{error}</div>}
        <button className="beo-btn beo-btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={signIn} disabled={busy}>
          {busy ? "Signing in…" : "Sign in"}
        </button>
      </div>
    </div>
  );
}

function MainApp({ user }) {
  const [loaded, setLoaded] = useState(false);
  const [categories, setCategories] = useState([]);
  const [budgets, setBudgets] = useState([]);
  const [tab, setTab] = useState("inventory");
  const [activeBudgetId, setActiveBudgetId] = useState(null);
  const [syncStatus, setSyncStatus] = useState("syncing");
  const skipNextSave = useRef(false);
  const docRef = db.collection("beoUsers").doc(user.uid);

  useEffect(() => {
    const unsub = docRef.onSnapshot(snap => {
      const data = snap.data();
      skipNextSave.current = true;
      if (data && data.categories) setCategories(data.categories);
      else setCategories(DEFAULT_CATEGORIES.map(n => ({ id: uid(), name: n, items: [] })));
      if (data && data.budgets) setBudgets(data.budgets);
      else setBudgets([]);
      setLoaded(true);
      setSyncStatus("synced");
    }, err => {
      console.error(err);
      setSyncStatus("error");
    });
    return unsub;
  }, []);

  useEffect(() => {
    if (!loaded) return;
    if (skipNextSave.current) { skipNextSave.current = false; return; }
    setSyncStatus("syncing");
    docRef.set({ categories, budgets }, { merge: true })
      .then(() => setSyncStatus("synced"))
      .catch(e => { console.error(e); setSyncStatus("error"); });
  }, [categories, budgets]);

  const openBudget = (id) => { setActiveBudgetId(id); setTab("builder"); };
  const createBudget = () => {
    const b = { id: uid(), name: "New Client Budget", clientName: "", date: new Date().toISOString().slice(0, 10), lines: [], profit: 0, commissionPercent: 0, commissionMode: "final", createdAt: Date.now() };
    setBudgets(prev => [b, ...prev]);
    openBudget(b.id);
  };

  if (!loaded) return <div style={{ padding: 40, color: "#6b1e23" }}>Loading your workspace…</div>;

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ borderBottom: "1px solid #EDE6D6", background: "#fff", padding: "18px 20px", display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div className="beo-serif" style={{ fontSize: 24, fontWeight: 700, color: "#6B1E23" }}>BEO Costing Ledger</div>
          <div style={{ fontSize: 11.5, color: syncStatus === "error" ? "#c9585d" : "#8a8071", marginTop: 2 }}>
            {syncStatus === "syncing" ? "Syncing…" : syncStatus === "error" ? "Sync error — check connection" : `Synced · ${user.email}`}
          </div>
        </div>
        <nav style={{ display: "flex", gap: 8 }}>
          <button className="beo-btn" onClick={() => setTab("inventory")} style={{ padding: "8px 14px", borderRadius: 6, fontSize: 14, background: tab === "inventory" ? "#6B1E23" : "transparent", color: tab === "inventory" ? "#FAF6EE" : "#6B1E23" }}>Inventory</button>
          <button className="beo-btn" onClick={() => setTab("budgets")} style={{ padding: "8px 14px", borderRadius: 6, fontSize: 14, background: (tab === "budgets" || tab === "builder") ? "#6B1E23" : "transparent", color: (tab === "budgets" || tab === "builder") ? "#FAF6EE" : "#6B1E23" }}>Client Budgets</button>
          <button className="beo-btn beo-btn-ghost" onClick={() => auth.signOut()}>Sign out</button>
        </nav>
      </div>
      <div style={{ padding: 20, maxWidth: 1200, margin: "0 auto" }}>
        {tab === "inventory" && <InventoryView categories={categories} setCategories={setCategories} />}
        {tab === "budgets" && <BudgetsListView budgets={budgets} setBudgets={setBudgets} onOpen={openBudget} onCreate={createBudget} />}
        {tab === "builder" && activeBudgetId && (
          <BudgetBuilder
            budget={budgets.find(b => b.id === activeBudgetId)}
            categories={categories}
            onBack={() => setTab("budgets")}
            onChange={(updated) => setBudgets(prev => prev.map(b => b.id === updated.id ? updated : b))}
          />
        )}
      </div>
    </div>
  );
}

function InventoryView({ categories, setCategories }) {
  const [openCat, setOpenCat] = useState(categories[0]?.id || null);
  const [newCatName, setNewCatName] = useState("");
  const [itemDraft, setItemDraft] = useState({});

  useEffect(() => { if ((!openCat || !categories.find(c => c.id === openCat)) && categories[0]) setOpenCat(categories[0].id); }, [categories]);

  const addCategory = () => {
    if (!newCatName.trim()) return;
    const c = { id: uid(), name: newCatName.trim(), items: [] };
    setCategories(prev => [...prev, c]);
    setNewCatName(""); setOpenCat(c.id);
  };
  const removeCategory = (id) => setCategories(prev => prev.filter(c => c.id !== id));
  const addItem = (catId) => {
    const draft = itemDraft[catId];
    if (!draft || !draft.name?.trim()) return;
    const item = { id: uid(), name: draft.name.trim(), cost: Number(draft.cost) || 0 };
    setCategories(prev => prev.map(c => c.id === catId ? { ...c, items: [...c.items, item] } : c));
    setItemDraft(prev => ({ ...prev, [catId]: { name: "", cost: "" } }));
  };
  const removeItem = (catId, itemId) => setCategories(prev => prev.map(c => c.id === catId ? { ...c, items: c.items.filter(i => i.id !== itemId) } : c));
  const updateItem = (catId, itemId, patch) => setCategories(prev => prev.map(c => c.id === catId ? { ...c, items: c.items.map(i => i.id === itemId ? { ...i, ...patch } : i) } : c));

  return (
    <div className="two-col">
      <div className="beo-card" style={{ padding: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#8a8071", textTransform: "uppercase", marginBottom: 10 }}>Folders</div>
        {categories.map(c => (
          <div key={c.id} onClick={() => setOpenCat(c.id)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", borderRadius: 6, cursor: "pointer", background: openCat === c.id ? "#F1EADA" : "transparent", marginBottom: 2 }}>
            <span style={{ fontSize: 14 }}>📁 {c.name} <span style={{ fontSize: 11, color: "#a39a89" }}>({c.items.length})</span></span>
            <span style={{ color: "#c98b8e", cursor: "pointer" }} onClick={(e) => { e.stopPropagation(); removeCategory(c.id); }}>🗑</span>
          </div>
        ))}
        <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
          <input className="beo-input" placeholder="New folder" value={newCatName} onChange={e => setNewCatName(e.target.value)} onKeyDown={e => e.key === "Enter" && addCategory()} style={{ fontSize: 13 }} />
          <button className="beo-btn beo-btn-gold" onClick={addCategory}>＋</button>
        </div>
      </div>
      <div className="beo-card" style={{ padding: 20 }}>
        {!openCat ? <div style={{ color: "#a39a89" }}>Create a folder to start adding items.</div> : (() => {
          const cat = categories.find(c => c.id === openCat);
          if (!cat) return null;
          return (
            <React.Fragment>
              <div className="beo-serif" style={{ fontSize: 22, fontWeight: 700, color: "#6B1E23", marginBottom: 14 }}>{cat.name}</div>
              {cat.items.length === 0 && <div style={{ color: "#a39a89", fontSize: 14, marginBottom: 10 }}>No items yet.</div>}
              {cat.items.map(item => (
                <div key={item.id} style={{ display: "grid", gridTemplateColumns: "1fr 120px 30px", gap: 8, alignItems: "center", padding: "8px 4px", borderTop: "1px solid #F1EADA" }}>
                  <input className="beo-input" value={item.name} onChange={e => updateItem(cat.id, item.id, { name: e.target.value })} />
                  <input className="beo-input" type="number" value={item.cost} onChange={e => updateItem(cat.id, item.id, { cost: Number(e.target.value) })} />
                  <span style={{ color: "#c98b8e", cursor: "pointer", textAlign: "center" }} onClick={() => removeItem(cat.id, item.id)}>🗑</span>
                </div>
              ))}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 120px auto", gap: 8, alignItems: "center", paddingTop: 10, marginTop: 10, borderTop: "1px dashed #E4DCC8" }}>
                <input className="beo-input" placeholder="New item name" value={itemDraft[cat.id]?.name || ""} onChange={e => setItemDraft(p => ({ ...p, [cat.id]: { ...p[cat.id], name: e.target.value } }))} onKeyDown={e => e.key === "Enter" && addItem(cat.id)} />
                <input className="beo-input" type="number" placeholder="Cost ₹" value={itemDraft[cat.id]?.cost || ""} onChange={e => setItemDraft(p => ({ ...p, [cat.id]: { ...p[cat.id], cost: e.target.value } }))} onKeyDown={e => e.key === "Enter" && addItem(cat.id)} />
                <button className="beo-btn beo-btn-primary" onClick={() => addItem(cat.id)}>＋ Add</button>
              </div>
            </React.Fragment>
          );
        })()}
      </div>
    </div>
  );
}

function BudgetsListView({ budgets, setBudgets, onOpen, onCreate }) {
  const removeBudget = (id) => setBudgets(prev => prev.filter(b => b.id !== id));
  const duplicateBudget = (b) => setBudgets(prev => [{ ...b, id: uid(), name: b.name + " (copy)", createdAt: Date.now() }, ...prev]);
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
        <div className="beo-serif" style={{ fontSize: 22, fontWeight: 700, color: "#6B1E23" }}>Client Budgets</div>
        <button className="beo-btn beo-btn-primary" onClick={onCreate}>＋ New client budget</button>
      </div>
      {budgets.length === 0 ? (
        <div className="beo-card" style={{ padding: 30, textAlign: "center", color: "#a39a89" }}>No client budgets yet.</div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 14 }}>
          {budgets.map(b => {
            const base = (b.lines || []).reduce((s, l) => s + l.cost * l.qty, 0);
            return (
              <div key={b.id} className="beo-card" style={{ padding: 16, cursor: "pointer" }} onClick={() => onOpen(b.id)}>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{b.name}</div>
                <div style={{ fontSize: 12, color: "#8a8071", marginTop: 2 }}>{b.clientName || "No client name"} · {b.date}</div>
                <div style={{ marginTop: 10, fontSize: 13, color: "#6B1E23" }}>Base cost: {inr(base)}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <button className="beo-btn beo-btn-ghost" onClick={(e) => { e.stopPropagation(); duplicateBudget(b); }}>Duplicate</button>
                  <button className="beo-btn beo-btn-ghost" style={{ color: "#c9585d" }} onClick={(e) => { e.stopPropagation(); removeBudget(b.id); }}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function BudgetBuilder({ budget, categories, onBack, onChange }) {
  const [search, setSearch] = useState("");
  if (!budget) return null;
  const update = (patch) => onChange({ ...budget, ...patch });

  const addLine = (catName, item) => {
    const exists = budget.lines.find(l => l.itemRef === item.id);
    if (exists) update({ lines: budget.lines.map(l => l.itemRef === item.id ? { ...l, qty: l.qty + 1 } : l) });
    else update({ lines: [...budget.lines, { id: uid(), itemRef: item.id, category: catName, name: item.name, cost: item.cost, qty: 1 }] });
  };
  const updateLine = (id, patch) => update({ lines: budget.lines.map(l => l.id === id ? { ...l, ...patch } : l) });
  const removeLine = (id) => update({ lines: budget.lines.filter(l => l.id !== id) });

  const baseCost = budget.lines.reduce((s, l) => s + l.cost * l.qty, 0);
  const profit = Number(budget.profit) || 0;
  const commissionPct = Number(budget.commissionPercent) || 0;
  const mode = budget.commissionMode || "final";
  let finalBudget, commissionAmount;
  if (mode === "final") {
    if (commissionPct >= 100) { finalBudget = Infinity; commissionAmount = Infinity; }
    else { finalBudget = (baseCost + profit) / (1 - commissionPct / 100); commissionAmount = finalBudget * (commissionPct / 100); }
  } else {
    commissionAmount = baseCost * (commissionPct / 100);
    finalBudget = baseCost + profit + commissionAmount;
  }

  const filteredCats = categories.map(c => ({ ...c, items: c.items.filter(i => i.name.toLowerCase().includes(search.toLowerCase())) })).filter(c => c.items.length > 0 || !search);

  const exportQuotation = () => {
    const printArea = document.getElementById("print-area");
    const rows = budget.lines.map(l => `<tr><td style="padding:8px 0;border-bottom:1px solid #eee;">${l.name}</td><td style="padding:8px 0;border-bottom:1px solid #eee;text-align:right;">${l.qty}</td></tr>`).join("");
    printArea.innerHTML = `
      <div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:#6B1E23;">Bloom Event Organizer</div>
      <div style="font-family:Inter,sans-serif;font-size:13px;color:#8a8071;margin-bottom:20px;">Event Quotation</div>
      <div style="font-family:Inter,sans-serif;font-size:14px;margin-bottom:6px;"><b>Client:</b> ${budget.clientName || "—"}</div>
      <div style="font-family:Inter,sans-serif;font-size:14px;margin-bottom:20px;"><b>Date:</b> ${budget.date}</div>
      <table style="width:100%;border-collapse:collapse;font-family:Inter,sans-serif;font-size:14px;margin-bottom:24px;">
        <thead><tr><th style="text-align:left;border-bottom:2px solid #6B1E23;padding-bottom:8px;">Item / Service</th><th style="text-align:right;border-bottom:2px solid #6B1E23;padding-bottom:8px;">Qty</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="background:#6B1E23;color:#FAF6EE;padding:16px 20px;border-radius:8px;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;">
        Total Budget: ${inr(finalBudget)}
      </div>
    `;
    window.print();
  };

  return (
    <div>
      <button className="beo-btn beo-btn-ghost" onClick={onBack} style={{ marginBottom: 16 }}>← Back to budgets</button>
      <div style={{ display: "flex", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        <input className="beo-input" style={{ fontSize: 18, fontWeight: 600, flex: "1 1 220px" }} value={budget.name} onChange={e => update({ name: e.target.value })} />
        <input className="beo-input" placeholder="Client name" value={budget.clientName} onChange={e => update({ clientName: e.target.value })} style={{ width: 180 }} />
        <input className="beo-input" type="date" value={budget.date} onChange={e => update({ date: e.target.value })} style={{ width: 160 }} />
        <button className="beo-btn beo-btn-gold" onClick={exportQuotation}>📄 Export Quotation</button>
      </div>
      <div className="builder-col">
        <div>
          <div className="beo-card" style={{ padding: 16, marginBottom: 16 }}>
            <input className="beo-input" placeholder="Search items across all folders…" value={search} onChange={e => setSearch(e.target.value)} style={{ marginBottom: 12 }} />
            <div style={{ maxHeight: 320, overflowY: "auto" }}>
              {filteredCats.map(c => (
                <div key={c.id} style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#8a8071", textTransform: "uppercase", margin: "6px 0" }}>{c.name}</div>
                  {c.items.map(item => (
                    <div key={item.id} onClick={() => addLine(c.name, item)} style={{ display: "flex", justifyContent: "space-between", padding: "6px 8px", borderRadius: 6, cursor: "pointer", fontSize: 13.5 }}>
                      <span>{item.name}</span><span style={{ color: "#8a8071" }}>{inr(item.cost)} ＋</span>
                    </div>
                  ))}
                </div>
              ))}
              {filteredCats.length === 0 && <div style={{ color: "#a39a89", fontSize: 13 }}>No items match.</div>}
            </div>
          </div>
          <div className="beo-card" style={{ padding: 16 }}>
            <div style={{ fontWeight: 700, marginBottom: 10 }}>Selected items ({budget.lines.length})</div>
            {budget.lines.length === 0 ? <div style={{ color: "#a39a89", fontSize: 13 }}>Click items on the left to add them.</div> : budget.lines.map(l => (
              <div key={l.id} style={{ display: "grid", gridTemplateColumns: "1fr 60px 90px 90px 24px", gap: 6, alignItems: "center", padding: "6px 4px", borderTop: "1px solid #F1EADA", fontSize: 13 }}>
                <div>{l.name} <span style={{ color: "#a39a89", fontSize: 10.5 }}>({l.category})</span></div>
                <input className="beo-input" type="number" min="1" value={l.qty} onChange={e => updateLine(l.id, { qty: Number(e.target.value) || 1 })} style={{ padding: "5px 6px" }} />
                <input className="beo-input" type="number" value={l.cost} onChange={e => updateLine(l.id, { cost: Number(e.target.value) || 0 })} style={{ padding: "5px 6px" }} />
                <div>{inr(l.cost * l.qty)}</div>
                <span style={{ color: "#c98b8e", cursor: "pointer", textAlign: "center" }} onClick={() => removeLine(l.id)}>×</span>
              </div>
            ))}
          </div>
        </div>
        <div className="beo-card" style={{ padding: 20, alignSelf: "start" }}>
          <div className="beo-serif" style={{ fontSize: 20, fontWeight: 700, color: "#6B1E23", marginBottom: 4 }}>Final Budget Calculator</div>
          <div style={{ fontSize: 12, color: "#8a8071", marginBottom: 16 }}>Commission on the final client budget by default.</div>
          <Row label="Base cost (all items)" value={inr(baseCost)} />
          <div style={{ margin: "14px 0" }}>
            <label style={{ fontSize: 12.5, fontWeight: 600 }}>Your desired profit (₹)</label>
            <input className="beo-input" type="number" value={budget.profit} onChange={e => update({ profit: Number(e.target.value) || 0 })} style={{ marginTop: 6 }} />
          </div>
          <div style={{ margin: "14px 0" }}>
            <label style={{ fontSize: 12.5, fontWeight: 600 }}>Hotel commission (%)</label>
            <input className="beo-input" type="number" value={budget.commissionPercent} onChange={e => update({ commissionPercent: Number(e.target.value) || 0 })} style={{ marginTop: 6 }} />
          </div>
          <div style={{ margin: "14px 0" }}>
            <label style={{ fontSize: 12.5, fontWeight: 600, display: "block", marginBottom: 6 }}>Commission is calculated on</label>
            <div style={{ display: "flex", gap: 6 }}>
              <button className="beo-btn" onClick={() => update({ commissionMode: "final" })} style={{ flex: 1, padding: "8px 6px", fontSize: 12.5, borderRadius: 6, background: mode === "final" ? "#6B1E23" : "#F1EADA", color: mode === "final" ? "#FAF6EE" : "#6B1E23" }}>Final client budget</button>
              <button className="beo-btn" onClick={() => update({ commissionMode: "base" })} style={{ flex: 1, padding: "8px 6px", fontSize: 12.5, borderRadius: 6, background: mode === "base" ? "#6B1E23" : "#F1EADA", color: mode === "base" ? "#FAF6EE" : "#6B1E23" }}>Your base cost</button>
            </div>
          </div>
          <div style={{ borderTop: "1px dashed #E4DCC8", margin: "16px 0", paddingTop: 14 }}>
            <Row label="Base cost" value={inr(baseCost)} />
            <Row label="Your profit" value={inr(profit)} />
            <Row label={`Hotel commission (${commissionPct}%)`} value={(commissionPct >= 100 && mode === "final") ? "—" : inr(commissionAmount)} />
          </div>
          <div style={{ background: "#6B1E23", borderRadius: 8, padding: "14px 16px" }}>
            <div style={{ fontSize: 12, color: "#E9D9B8" }}>Quote to client</div>
            <div className="beo-serif" style={{ fontSize: 28, fontWeight: 700, color: "#FAF6EE" }}>
              {(commissionPct >= 100 && mode === "final") ? "Set commission < 100%" : inr(finalBudget)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Row({ label, value }) {
  return <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5, padding: "4px 0" }}><span style={{ color: "#8a8071" }}>{label}</span><span style={{ fontWeight: 600 }}>{value}</span></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
